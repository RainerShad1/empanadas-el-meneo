services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: empanadas
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d empanadas"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/empanadas?schema=public
      JWT_SECRET: cambia-esto-en-produccion-por-algo-largo
      PORT: 4000
      FRONTEND_URL: http://localhost:3000
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
      # Las variables NEXT_PUBLIC_* se pasan como build args porque
      # Next.js las incrusta en el bundle durante la compilacion.
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api
        NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: tu_api_key_aqui
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:3000'

volumes:
  db_data:
